name: Release

# Triggered by Rafael publishing the GitHub Release (UI or `gh release create`).
# This workflow does NOT create the release — it only publishes the application
# to the AWS Serverless Application Repository.

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Publish to AWS Serverless Application Repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_PROD_ACCOUNT_ID }}
        run: bash ./.github/workflows/deploy.sh
